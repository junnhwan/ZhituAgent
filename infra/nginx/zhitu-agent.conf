# zhitu-agent-java nginx site
#
# Install via scripts/install.sh — substitutes SERVER_NAME / APP_DIR /
# APP_PORT and symlinks into /etc/nginx/sites-enabled/.
#
# Routing model:
#   /            → static frontend (frontend/dist, built by deploy.sh)
#   /api/        → reverse proxy to Spring Boot (8080 by default)
#   /api/*/stream  SSE-friendly: buffering off, HTTP/1.1, long timeouts
#   /actuator/   → exposed for ops only, gated by IP allowlist
#
# TLS is intentionally NOT configured here. Run `certbot --nginx -d
# your.domain.com` after install.sh and certbot will inject the SSL
# directives into this same file in-place. Don't hand-write SSL config
# — certbot's renewal hook only edits files it manages.

# Optional: rate limit the API surface so a single bad client can't
# exhaust LLM quota. 30 r/s with bursts of 60 matches GLM-5.1's 48/min
# rate limit when amortized over typical sessions.
limit_req_zone $binary_remote_addr zone=zhitu_api:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    # MinIO uploads can be multi-MB PDFs; default 1m client_max_body_size
    # rejects them with 413 before they ever hit Spring Boot. 100m is the
    # same ceiling the Tika consumer uses for memory-circuit-breaker.
    client_max_body_size 100m;

    # Frontend — Vite build output. SPA fallback to index.html so React
    # Router deep links don't 404.
    root __APP_DIR__/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache hashed asset chunks aggressively, never cache index.html
        # (otherwise users keep loading stale JS pointing at deleted hashes).
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend API. Note: SSE endpoints (Server-Sent Events for streaming
    # tool calls) need buffering off + long read timeout. We apply those
    # globally on /api/ so we don't have to maintain a separate location
    # block per streaming route — the cost on non-streaming endpoints is
    # negligible (Spring Boot already finishes responses quickly).
    location /api/ {
        limit_req zone=zhitu_api burst=60 nodelay;

        proxy_pass http://127.0.0.1:__APP_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE / streaming: do not buffer the upstream response, do not
        # cache, do not chunk-collapse. Without these, browser EventSource
        # sees nothing until the LLM response completes.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Operational endpoints — Spring Boot Actuator. Locked down to
    # localhost + a placeholder admin CIDR. Edit the allowlist before
    # going live, otherwise health/metrics are world-readable.
    location /actuator/ {
        allow 127.0.0.1;
        allow ::1;
        # allow 1.2.3.4;     # add your office IP
        deny all;

        proxy_pass http://127.0.0.1:__APP_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Standard hardening headers. CSP is intentionally permissive for
    # connect-src because the React app fetches /api on the same origin
    # but also embeds Trace iframes from the same origin — tighten if
    # you remove that feature.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
