# 云服务器中间件部署 (公网 IP: 106.12.190.62)
# 用法:
#   1. scp 整个 infra/cloud 目录到云服务器, 或 git clone 后 cd 进来
#   2. cp .env.example .env, 填强密码 (32 位 random)
#   3. docker compose up -d
#   4. 防火墙白名单只放行你本地 IP, 端口: 9200 / 9092 / 6379 / 9100 / 9101 / 3306
#   5. 演示完后 docker compose down 关闭, 别留长期暴露
#
# 安全提示:
#   - ES 已启用 xpack 认证 (2026-05-03 勒索事件后强制), 生产模式必须有强密码
#   - Kafka 仍 PLAINTEXT (内网模式), 完全靠 IP 白名单兜底, 不要把 9092 暴露到公网
#   - Redis/MinIO/MySQL 都加了密码
#   - 任何端口对全互联网开放都是高危, IP 白名单是底线

services:
  elasticsearch:
    image: elasticsearch:8.10.4
    container_name: zhitu-cloud-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ES_PASSWORD}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - es-plugins:/usr/share/elasticsearch/plugins
    command: >
      bash -c "
      if [ ! -d /usr/share/elasticsearch/plugins/analysis-ik ]; then
        echo 'Installing IK plugin (first boot only)...';
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.10.4.zip;
      fi;
      exec /usr/local/bin/docker-entrypoint.sh elasticsearch"
    healthcheck:
      # xpack auth is on, so an unauthenticated curl gets 401 → exit 22 →
      # container reports unhealthy forever even though ES is fine. Pass
      # ELASTIC_PASSWORD on the auth header. Status filter accepts yellow
      # because single-node ES is permanently yellow (replica shards
      # cannot be allocated when there's nowhere to put them) and that
      # is not a defect we should alert on.
      test: ["CMD-SHELL", "curl -sf -u elastic:${ES_PASSWORD} 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=3s' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: zhitu-cloud-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:latest
    container_name: zhitu-cloud-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9094,EXTERNAL://106.12.190.62:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka-data:/bitnami/kafka
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: zhitu-cloud-minio
    ports:
      - "9100:9000"   # API (默认 9000 被 Portainer 占用)
      - "9101:9001"   # Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: zhitu-cloud-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=zhitu_agent
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Prometheus — metrics scrape + query for the multi-agent SRE narrative.
  # Security: bcrypt basic auth via web.yml + cloud security group IP whitelist
  # (same belt-and-braces as ES after the 2026-05-03 ransomware incident).
  # Don't drop either — basic auth alone is brute-forceable, IP whitelist alone
  # collapses if the rule is mis-typed.
  #
  # Image: v3.3.1 (not v2.55.0). v3 is fully wire-compatible with our scrape
  # config and basic_auth_users format; the only breaking change at v3 is
  # default UTF-8 metric names + removal of long-deprecated 2018-era APIs,
  # neither of which we use. v2.55.0 chosen on cn-hosted demo boxes is a
  # frequent docker-hub pull failure (registry.docker.io regional throttle),
  # while v3.3.1 is in the standard image set most operators already have
  # locally.
  #
  # Host port 9091 (not 9090). 9090 collides with several common processes:
  # apt-installed prometheus, mihomo/clash REST API dashboard, some portainer
  # builds. 9091 is uncontested. The container still listens on 9090
  # internally so prometheus.yml self-scrape (if added) needs no change.
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: zhitu-cloud-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-web.yml:/etc/prometheus/web.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.config.file=/etc/prometheus/web.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  # node_exporter — host-level OS metrics (CPU, memory, disk, network).
  # No public port; only the prometheus container reaches it via docker DNS,
  # so it stays inside the compose network and skips its own auth layer.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: zhitu-cloud-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

volumes:
  es-data:
  es-plugins:
  redis-data:
  kafka-data:
  minio-data:
  mysql-data:
  prometheus-data:
