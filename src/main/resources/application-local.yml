spring:
  data:
    redis:
      host: ${ZHITU_REDIS_HOST:localhost}
      port: ${ZHITU_REDIS_PORT:6379}
      password: ${ZHITU_REDIS_PASSWORD:}
      database: ${ZHITU_REDIS_DATABASE:0}

zhitu:
  infrastructure:
    redis-enabled: ${ZHITU_REDIS_ENABLED:false}
    elasticsearch-enabled: ${ZHITU_ES_ENABLED:false}
    minio-enabled: ${ZHITU_MINIO_ENABLED:false}
  llm:
    mock-mode: ${ZHITU_LLM_MOCK_MODE:false}
    base-url: ${ZHITU_CHAT_BASE_URL:}
    api-key: ${ZHITU_CHAT_API_KEY:}
    model-name: ${ZHITU_CHAT_MODEL_NAME:}
  embedding:
    base-url: ${ZHITU_EMBEDDING_URL:}
    api-key: ${ZHITU_EMBEDDING_API_KEY:}
    model-name: ${ZHITU_EMBEDDING_MODEL_NAME:}
    dimensions: ${ZHITU_EMBEDDING_DIMENSIONS:0}
  rerank:
    url: ${ZHITU_RERANK_URL:}
    api-key: ${ZHITU_RERANK_API_KEY:}
    model-name: ${ZHITU_RERANK_MODEL_NAME:}
  elasticsearch:
    host: ${ZHITU_ES_HOST:localhost}
    port: ${ZHITU_ES_PORT:9200}
    scheme: ${ZHITU_ES_SCHEME:http}
    username: ${ZHITU_ES_USERNAME:}
    password: ${ZHITU_ES_PASSWORD:}
    index-name: ${ZHITU_ES_INDEX_NAME:zhitu_agent_knowledge}
    vector-dim: ${ZHITU_ES_VECTOR_DIM:4096}
  minio:
    endpoint: ${ZHITU_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${ZHITU_MINIO_ACCESS_KEY:}
    secret-key: ${ZHITU_MINIO_SECRET_KEY:}
    bucket: ${ZHITU_MINIO_BUCKET:zhitu-agent-files}
    presigned-url-expiry-seconds: ${ZHITU_MINIO_PRESIGNED_URL_EXPIRY:3600}
  file:
    upload-chunk-size: ${ZHITU_FILE_UPLOAD_CHUNK_SIZE:5242880}
    parent-chunk-size: ${ZHITU_FILE_PARENT_CHUNK_SIZE:1048576}
    child-chunk-size: ${ZHITU_FILE_CHILD_CHUNK_SIZE:512}
    chunk-overlap: ${ZHITU_FILE_CHUNK_OVERLAP:64}
    memory-threshold: ${ZHITU_FILE_MEMORY_THRESHOLD:0.8}
  mcp:
    # Set ZHITU_MCP_ENABLED=true to wire 4 real MCP servers (Tavily / Baidu /
    # Filesystem / Prometheus) into the LLM's function-calling vocabulary.
    # When false (default) the MockMcpClient is not registered either — the
    # whole MCP path is dormant. When true with empty `servers`, falls back to
    # MockMcpClient so the demo path still works.
    enabled: ${ZHITU_MCP_ENABLED:false}
    servers:
      # Tavily — AI-optimized international web search. 1000 free queries/month.
      # https://tavily.com → API key. stdio via npx.
      - name: tavily
        transport: stdio
        command: npx
        args:
          - "-y"
          - "tavily-mcp@latest"
        env:
          TAVILY_API_KEY: ${TAVILY_API_KEY:}

      # Baidu Search — official Chinese search via Baidu Qianfan AppBuilder.
      # Streamable HTTP transport (MCP spec 2025-06-18 new transport).
      # Free tier from https://console.bce.baidu.com/qianfan/ → create app → get
      # API Key + Secret Key. Endpoint may need adjustment per docs.
      - name: baidu
        transport: streamable-http
        url: ${BAIDU_MCP_URL:https://qianfan.baidubce.com/v2/mcp/baidu-search}
        env:
          BAIDU_API_KEY: ${BAIDU_API_KEY:}
          BAIDU_SECRET_KEY: ${BAIDU_SECRET_KEY:}

      # Filesystem — official MCP reference server. No API key. Reads files
      # under MCP_FS_ROOT (default /tmp). Useful demo for SRE agent reading
      # runbooks / log files.
      - name: filesystem
        transport: stdio
        command: npx
        args:
          - "-y"
          - "@modelcontextprotocol/server-filesystem"
          - ${MCP_FS_ROOT:/tmp}

      # Prometheus — query metrics from a Prometheus instance. Pairs with the
      # multi-agent SRE narrative (PromQL execute_query / range_query).
      # Started via uvx (Python). Optional — comment out if uvx unavailable.
      - name: prometheus
        transport: stdio
        command: uvx
        args:
          - "prometheus-mcp-server"
        env:
          PROMETHEUS_URL: ${PROMETHEUS_URL:http://localhost:9090}
